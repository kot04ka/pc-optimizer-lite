name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Build app
        shell: powershell
        run: .\build.bat

      - name: Prepare release notes
        shell: powershell
        run: |
          $tag = $env:GITHUB_REF_NAME
          $version = $tag.TrimStart('v')
          $onedirZip = "installer_output\PC-Optimizer-Lite-windows-x64.zip"
          $setup = "installer_output\PC-Optimizer-Lite-Setup.exe"
          $onedirHash = (Get-FileHash -LiteralPath $onedirZip -Algorithm SHA256).Hash.ToLowerInvariant()
          $setupHash = (Get-FileHash -LiteralPath $setup -Algorithm SHA256).Hash.ToLowerInvariant()
          # Extract changelog entry for this version from README.md
          $readmeContent = Get-Content 'README.md' -Raw -Encoding UTF8
          $escapedVersion = [regex]::Escape($version)
          $pattern = "(?sm)^###\s+$escapedVersion\s*`$\r?\n(.*?)(?=\r?\n^###\s|\Z)"
          $match = [regex]::Match($readmeContent, $pattern)
          if ($match.Success) {
            $changelog = $match.Groups[1].Value.Trim()
          } else {
            $changelog = "PC Optimizer Lite $tag"
          }
          $notes = @(
            $changelog,
            "",
            "PC-Optimizer-Lite-windows-x64.zip sha256: $onedirHash",
            "PC-Optimizer-Lite-Setup.exe sha256: $setupHash"
          ) -join [Environment]::NewLine
          $notes | Set-Content -LiteralPath RELEASE_NOTES.md -Encoding UTF8

      - name: Publish GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $ErrorActionPreference = "Continue"
          gh release view $tag *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          $ErrorActionPreference = "Stop"
          if (-not $releaseExists) {
            gh release create $tag `
              "installer_output\PC-Optimizer-Lite-windows-x64.zip#PC-Optimizer-Lite-windows-x64.zip" `
              "installer_output\PC-Optimizer-Lite-Setup.exe#PC-Optimizer-Lite-Setup.exe" `
              --title "PC Optimizer Lite $tag" `
              --notes-file RELEASE_NOTES.md
          } else {
            gh release upload $tag `
              "installer_output\PC-Optimizer-Lite-windows-x64.zip#PC-Optimizer-Lite-windows-x64.zip" `
              "installer_output\PC-Optimizer-Lite-Setup.exe#PC-Optimizer-Lite-Setup.exe" `
              --clobber
            gh release edit $tag --notes-file RELEASE_NOTES.md
          }
