name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Build app
        shell: powershell
        run: .\build.bat

      - name: Prepare release notes
        shell: powershell
        run: |
          $onedirZip = "installer_output\PC-Optimizer-Lite-windows-x64.zip"
          $setup = "installer_output\PC-Optimizer-Lite-Setup.exe"
          $onedirHash = (Get-FileHash -LiteralPath $onedirZip -Algorithm SHA256).Hash.ToLowerInvariant()
          $setupHash = (Get-FileHash -LiteralPath $setup -Algorithm SHA256).Hash.ToLowerInvariant()
          $notes = @(
            "Hot-fix: switched PC Optimizer Lite to onedir packaging and made sleep mode safe for windowed apps.",
            "",
            "Changes:",
            "- Main distribution is now an onedir folder installed by Inno Setup.",
            "- Auto-update downloads the onedir ZIP, verifies size and SHA256 before applying it, and replaces the whole app directory after the old process exits.",
            "- Old files from previous versions are removed instead of being copied over.",
            "- Sleep mode now uses priority sleep for visible/data-risk apps, keeps deep suspend for headless-safe candidates, and wakes via foreground/cursor polling.",
            "- Windows Defender and other system protection settings are not changed.",
            "",
            "PC-Optimizer-Lite-windows-x64.zip sha256: $onedirHash",
            "PC-Optimizer-Lite-Setup.exe sha256: $setupHash"
          ) -join [Environment]::NewLine
          $notes | Set-Content -LiteralPath RELEASE_NOTES.md -Encoding UTF8

      - name: Publish GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $ErrorActionPreference = "Continue"
          gh release view $tag *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          $ErrorActionPreference = "Stop"
          if (-not $releaseExists) {
            gh release create $tag `
              "installer_output\PC-Optimizer-Lite-windows-x64.zip#PC-Optimizer-Lite-windows-x64.zip" `
              "installer_output\PC-Optimizer-Lite-Setup.exe#PC-Optimizer-Lite-Setup.exe" `
              --title "PC Optimizer Lite $tag" `
              --notes-file RELEASE_NOTES.md
          } else {
            gh release upload $tag `
              "installer_output\PC-Optimizer-Lite-windows-x64.zip#PC-Optimizer-Lite-windows-x64.zip" `
              "installer_output\PC-Optimizer-Lite-Setup.exe#PC-Optimizer-Lite-Setup.exe" `
              --clobber
          }
