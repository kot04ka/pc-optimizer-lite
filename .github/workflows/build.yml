name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Build app
        shell: powershell
        run: .\build.bat

      - name: Prepare release notes
        shell: powershell
        run: |
          $onedirZip = "installer_output\PC-Optimizer-Lite-windows-x64.zip"
          $setup = "installer_output\PC-Optimizer-Lite-Setup.exe"
          $onedirHash = (Get-FileHash -LiteralPath $onedirZip -Algorithm SHA256).Hash.ToLowerInvariant()
          $setupHash = (Get-FileHash -LiteralPath $setup -Algorithm SHA256).Hash.ToLowerInvariant()
          $notes = @(
            "Hot-fix: fixed the PC Optimizer Lite auto-update loop by switching updates to the Inno Setup installer.",
            "",
            "Changes:",
            "- Main distribution is now an onedir folder installed by Inno Setup.",
            "- Auto-update downloads PC-Optimizer-Lite-Setup.exe, verifies size and SHA256, launches it from TEMP with /VERYSILENT /SUPPRESSMSGBOXES /NORESTART, and exits immediately.",
            "- Removed the self-replacement PowerShell script and in-app folder rename/move updater.",
            "- Inno Setup closes/restarts the app with CloseApplications=yes and RestartApplications=yes.",
            "- Users stuck on 1.3.8 must install this release manually once with PC-Optimizer-Lite-Setup.exe; later auto-updates use the fixed installer flow.",
            "- Windows Defender and other system protection settings are not changed.",
            "",
            "PC-Optimizer-Lite-windows-x64.zip sha256: $onedirHash",
            "PC-Optimizer-Lite-Setup.exe sha256: $setupHash"
          ) -join [Environment]::NewLine
          $notes | Set-Content -LiteralPath RELEASE_NOTES.md -Encoding UTF8

      - name: Publish GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $ErrorActionPreference = "Continue"
          gh release view $tag *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          $ErrorActionPreference = "Stop"
          if (-not $releaseExists) {
            gh release create $tag `
              "installer_output\PC-Optimizer-Lite-windows-x64.zip#PC-Optimizer-Lite-windows-x64.zip" `
              "installer_output\PC-Optimizer-Lite-Setup.exe#PC-Optimizer-Lite-Setup.exe" `
              --title "PC Optimizer Lite $tag" `
              --notes-file RELEASE_NOTES.md
          } else {
            gh release upload $tag `
              "installer_output\PC-Optimizer-Lite-windows-x64.zip#PC-Optimizer-Lite-windows-x64.zip" `
              "installer_output\PC-Optimizer-Lite-Setup.exe#PC-Optimizer-Lite-Setup.exe" `
              --clobber
          }
