name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build app
        shell: powershell
        run: .\build.bat

      - name: Prepare release notes
        shell: powershell
        run: |
          $portable = "dist\PC Optimizer Lite.exe"
          $setup = "installer_output\PC-Optimizer-Lite-Setup.exe"
          $portableHash = (Get-FileHash -LiteralPath $portable -Algorithm SHA256).Hash.ToLowerInvariant()
          $setupHash = (Get-FileHash -LiteralPath $setup -Algorithm SHA256).Hash.ToLowerInvariant()
          $notes = @(
            "Hot-fix: Исправлена задержка ввода в Telegram, Discord и других интерактивных приложениях при работе оптимизатора.",
            "",
            "Что изменено:",
            "- CPU priority/affinity больше не применяется к активному окну, видимым интерактивным приложениям и известным мессенджерам/браузерам/редакторам.",
            "- Если пользователь возвращает окно в фокус, ранее примененные CPU-ограничения немедленно восстанавливаются.",
            "- Старт приложения стал мягче: мониторинг запускается с задержкой, первый тяжелый сбор таблицы процессов откладывается, проверка обновлений не стартует одновременно с GUI.",
            "- Подтверждено: глобальные хуки клавиатуры/мыши не используются; активность пользователя определяется через GetLastInputInfo().",
            "",
            "PC-Optimizer-Lite.exe sha256: $portableHash",
            "PC.Optimizer.Lite.exe sha256: $portableHash",
            "PC Optimizer Lite.exe sha256: $portableHash",
            "PC-Optimizer-Lite-Setup.exe sha256: $setupHash"
          ) -join [Environment]::NewLine
          $notes | Set-Content -LiteralPath RELEASE_NOTES.md -Encoding UTF8

      - name: Publish GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $ErrorActionPreference = "Continue"
          gh release view $tag *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          $ErrorActionPreference = "Stop"
          if (-not $releaseExists) {
            gh release create $tag `
              "dist\PC Optimizer Lite.exe#PC-Optimizer-Lite.exe" `
              "installer_output\PC-Optimizer-Lite-Setup.exe#PC-Optimizer-Lite-Setup.exe" `
              --title "PC Optimizer Lite $tag" `
              --notes-file RELEASE_NOTES.md
          } else {
            gh release upload $tag `
              "dist\PC Optimizer Lite.exe#PC-Optimizer-Lite.exe" `
              "installer_output\PC-Optimizer-Lite-Setup.exe#PC-Optimizer-Lite-Setup.exe" `
              --clobber
          }
