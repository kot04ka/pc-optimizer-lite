name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build app
        shell: powershell
        run: .\build.bat

      - name: Prepare release notes
        shell: powershell
        run: |
          $portable = "dist\PC Optimizer Lite.exe"
          $setup = "installer_output\PC-Optimizer-Lite-Setup.exe"
          $portableHash = (Get-FileHash -LiteralPath $portable -Algorithm SHA256).Hash.ToLowerInvariant()
          $setupHash = (Get-FileHash -LiteralPath $setup -Algorithm SHA256).Hash.ToLowerInvariant()
          $notes = @(
            "Hot-fix: исправлена ошибка загрузки после обновления (`Failed to load Python DLL ... _MEI...\python312.dll`).",
            "",
            "Что изменено:",
            "- Апдейтер дожидается полного закрытия старого процесса по PID, использует timeout и retry при Windows file lock.",
            "- Старый exe заменяется только после проверки размера/sha256 скачанного asset и успешного Move-Item.",
            "- Установщик использует onedir-сборку приложения, чтобы установленная версия не распаковывалась в %TEMP%\_MEI при каждом запуске.",
            "",
            "Если приложение уже не запускается с ошибкой python312.dll:",
            "скачайте PC-Optimizer-Lite-Setup.exe из этого релиза и установите поверх старой версии вручную.",
            "",
            "PC-Optimizer-Lite.exe sha256: $portableHash",
            "PC.Optimizer.Lite.exe sha256: $portableHash",
            "PC Optimizer Lite.exe sha256: $portableHash",
            "PC-Optimizer-Lite-Setup.exe sha256: $setupHash"
          ) -join [Environment]::NewLine
          $notes | Set-Content -LiteralPath RELEASE_NOTES.md -Encoding UTF8

      - name: Publish GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $ErrorActionPreference = "Continue"
          gh release view $tag *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          $ErrorActionPreference = "Stop"
          if (-not $releaseExists) {
            gh release create $tag `
              "dist\PC Optimizer Lite.exe#PC-Optimizer-Lite.exe" `
              "installer_output\PC-Optimizer-Lite-Setup.exe#PC-Optimizer-Lite-Setup.exe" `
              --title "PC Optimizer Lite $tag" `
              --notes-file RELEASE_NOTES.md
          } else {
            gh release upload $tag `
              "dist\PC Optimizer Lite.exe#PC-Optimizer-Lite.exe" `
              "installer_output\PC-Optimizer-Lite-Setup.exe#PC-Optimizer-Lite-Setup.exe" `
              --clobber
          }
