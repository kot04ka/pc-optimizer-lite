name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build app
        shell: powershell
        run: .\build.bat

      - name: Prepare release notes
        shell: powershell
        run: |
          $portable = "dist\PC Optimizer Lite.exe"
          $setup = "installer_output\PC-Optimizer-Lite-Setup.exe"
          $portableHash = (Get-FileHash -LiteralPath $portable -Algorithm SHA256).Hash.ToLowerInvariant()
          $setupHash = (Get-FileHash -LiteralPath $setup -Algorithm SHA256).Hash.ToLowerInvariant()
          $notes = @(
            "Hot-fix: fixed input lag in Telegram, Discord, browsers, editors, and other interactive apps while the optimizer is running.",
            "",
            "Changes:",
            "- CPU priority/affinity relief now skips the active window, visible interactive apps, and known messengers/browsers/editors.",
            "- Previously applied CPU limits are restored immediately when the user focuses the affected app.",
            "- Startup is softer: monitoring starts after a delay, the first heavy process-table refresh is deferred, and update checks no longer start together with the GUI.",
            "- Confirmed: no global keyboard/mouse hooks are used; user activity is checked with GetLastInputInfo().",
            "",
            "PC-Optimizer-Lite.exe sha256: $portableHash",
            "PC.Optimizer.Lite.exe sha256: $portableHash",
            "PC Optimizer Lite.exe sha256: $portableHash",
            "PC-Optimizer-Lite-Setup.exe sha256: $setupHash"
          ) -join [Environment]::NewLine
          $notes | Set-Content -LiteralPath RELEASE_NOTES.md -Encoding UTF8

      - name: Publish GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $ErrorActionPreference = "Continue"
          gh release view $tag *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          $ErrorActionPreference = "Stop"
          if (-not $releaseExists) {
            gh release create $tag `
              "dist\PC Optimizer Lite.exe#PC-Optimizer-Lite.exe" `
              "installer_output\PC-Optimizer-Lite-Setup.exe#PC-Optimizer-Lite-Setup.exe" `
              --title "PC Optimizer Lite $tag" `
              --notes-file RELEASE_NOTES.md
          } else {
            gh release upload $tag `
              "dist\PC Optimizer Lite.exe#PC-Optimizer-Lite.exe" `
              "installer_output\PC-Optimizer-Lite-Setup.exe#PC-Optimizer-Lite-Setup.exe" `
              --clobber
          }
