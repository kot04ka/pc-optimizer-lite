name: Codex Apply 1.3.3

on:
  push:
    branches:
      - main
    paths:
      - ".codex-patches/pc-optimizer-lite-1.3.3.patch.gz.b64"
      - ".github/workflows/codex-apply-1-3-3.yml"

permissions:
  contents: write

defaults:
  run:
    shell: powershell

jobs:
  apply-build-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply staged patch
        run: |
          $ErrorActionPreference = 'Stop'
          git config core.autocrlf false
          $payloadPath = '.codex-patches\pc-optimizer-lite-1.3.3.patch.gz.b64'
          $b64 = (Get-Content -LiteralPath $payloadPath -Raw).Trim()
          $compressed = [Convert]::FromBase64String($b64)
          $inputStream = New-Object System.IO.MemoryStream(, $compressed)
          $gzip = New-Object System.IO.Compression.GZipStream($inputStream, [System.IO.Compression.CompressionMode]::Decompress)
          $reader = New-Object System.IO.StreamReader($gzip, [System.Text.Encoding]::UTF8)
          $patch = $reader.ReadToEnd()
          $reader.Dispose()
          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText((Join-Path (Get-Location) 'codex-1.3.3.patch'), $patch, $utf8NoBom)
          git apply --whitespace=nowarn codex-1.3.3.patch
          Remove-Item -LiteralPath codex-1.3.3.patch -Force

      - name: Build and test
        run: |
          $ErrorActionPreference = 'Stop'
          .\build.bat
          & .\.venv\Scripts\python.exe -m unittest discover -s tests

      - name: Commit applied update and tag
        run: |
          $ErrorActionPreference = 'Stop'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md RELEASE.md pyproject.toml tests/test_core.py pc_optimizer_lite/config.py pc_optimizer_lite/optimizer.py pc_optimizer_lite/pyside_gui.py pc_optimizer_lite/ram_cleaner.py pc_optimizer_lite/sleep_manager.py pc_optimizer_lite/version.py
          git rm --ignore-unmatch .codex-patches/pc-optimizer-lite-1.3.3.patch.gz.b64 .github/workflows/codex-apply-1-3-3.yml
          git status --short
          git commit -m 'Improve optimizer autopilot and UI'
          git tag -f v1.3.3
          git push origin HEAD:main
          git push -f origin v1.3.3

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = 'v1.3.3'
          $portable = 'dist\PC Optimizer Lite.exe'
          $installer = 'installer_output\PC-Optimizer-Lite-Setup.exe'
          $hash = (Get-FileHash -LiteralPath $portable -Algorithm SHA256).Hash.ToLowerInvariant()
          "PC Optimizer Lite $tag`n`nsha256: $hash" | Set-Content -LiteralPath RELEASE_NOTES.md -Encoding UTF8
          $ErrorActionPreference = 'Continue'
          gh release view $tag *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          $ErrorActionPreference = 'Stop'
          if (-not $releaseExists) {
            gh release create $tag `
              "$portable#PC-Optimizer-Lite.exe" `
              "$installer#PC-Optimizer-Lite-Setup.exe" `
              --title "PC Optimizer Lite $tag" `
              --notes-file RELEASE_NOTES.md
          } else {
            gh release upload $tag `
              "$portable#PC-Optimizer-Lite.exe" `
              "$installer#PC-Optimizer-Lite-Setup.exe" `
              --clobber
          }
